# Compose compiler stability configuration TEMPLATE.
#
# This file is NOT read from this repo — ComposeMetrics.kt's configureComposeCompilerMetrics()
# reads `compose_stability.conf` from the CONSUMER's own rootProject directory at build time.
# Copy this file into the root of the project that applies shared.kmp.compose (or any plugin that
# builds on it: shared.cmp.feature) and edit it to list your own external/unstable-by-default types.
#
# One fully-qualified class name (or wildcard) per line. Marking a type here tells the Compose
# compiler to treat it as stable even though it can't infer that itself (e.g. immutable classes from
# a library outside your control) — this avoids unnecessary recomposition when it's passed as a
# composable parameter.
#
# Examples (delete or replace with your own types):
# kotlinx.datetime.Instant
# com.example.yourapp.core.model.UserId
