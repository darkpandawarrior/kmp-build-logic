<svg viewBox="0 0 900 170" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="kbl-title kbl-desc">
  <title id="kbl-title">kmp-build-logic</title>
  <desc id="kbl-desc">Shared Gradle convention-plugin toolkit for Kotlin Multiplatform projects — a pipeline of convention plugins feeding every consumer repo.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7F52FF"/>
      <stop offset="55%" stop-color="#4285F4"/>
      <stop offset="100%" stop-color="#3DDC84"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="898" height="168" rx="16" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>

  <text x="450" y="62" text-anchor="middle" font-family="'Segoe UI', -apple-system, Helvetica, Arial, sans-serif" font-size="46" font-weight="800" fill="url(#wordmark)">
    kmp-build-logic
  </text>

  <!-- 17 convention plugins, one pipeline -->
  <line id="kbl-rail" x1="60" y1="104" x2="840" y2="104" stroke="#30363d" stroke-width="2"/>
  <g id="kbl-dots">
    <g fill="#4285F4">
      <circle cx="60" cy="104" r="4"/><circle cx="115" cy="104" r="4"/><circle cx="170" cy="104" r="4"/>
      <circle cx="225" cy="104" r="4"/><circle cx="280" cy="104" r="4"/><circle cx="335" cy="104" r="4"/>
    </g>
    <g fill="#7F52FF">
      <circle cx="390" cy="104" r="4"/><circle cx="445" cy="104" r="4"/><circle cx="500" cy="104" r="4"/>
      <circle cx="555" cy="104" r="4"/><circle cx="610" cy="104" r="4"/>
    </g>
    <g fill="#3DDC84">
      <circle cx="665" cy="104" r="4"/><circle cx="720" cy="104" r="4"/><circle cx="775" cy="104" r="4"/>
      <circle cx="840" cy="104" r="4"/>
    </g>
  </g>

  <text x="450" y="155" text-anchor="middle" font-family="'Segoe UI', -apple-system, Helvetica, Arial, sans-serif" font-size="14" letter-spacing="3" fill="#94a3b8">17 GRADLE CONVENTION PLUGINS &#183; KOTLIN MULTIPLATFORM &#183; COMPOSE</text>
</svg>
