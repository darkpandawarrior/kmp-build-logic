<svg viewBox="0 0 900 170" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="kmp-build-logic">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7F52FF"/>
      <stop offset="55%" stop-color="#4285F4"/>
      <stop offset="100%" stop-color="#3DDC84"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="898" height="168" rx="16" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>

  <text x="450" y="62" text-anchor="middle" font-family="'Segoe UI', -apple-system, Helvetica, Arial, sans-serif" font-size="46" font-weight="800" fill="url(#wordmark)">
    kmp-build-logic
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0s" fill="freeze"/>
  </text>

  <!-- build pipeline motif: 14 convention plugins lighting up in sequence, confined to y=100..108,
       clear of the title (bottom ~70) and tagline (top ~140) -->
  <line x1="60" y1="104" x2="840" y2="104" stroke="#30363d" stroke-width="2"/>
  <g fill="#4285F4">
    <circle cx="60" cy="104" r="4"><animate attributeName="fill-opacity" values="0.3;1;0.3" dur="2.8s" begin="0.0s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="104" r="4"><animate attributeName="fill-opacity" values="0.3;1;0.3" dur="2.8s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="104" r="4"><animate attributeName="fill-opacity" values="0.3;1;0.3" dur="2.8s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="240" cy="104" r="4"><animate attributeName="fill-opacity" values="0.3;1;0.3" dur="2.8s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="104" r="4"><animate attributeName="fill-opacity" values="0.3;1;0.3" dur="2.8s" begin="0.8s" repeatCount="indefinite"/></circle>
  </g>
  <g fill="#7F52FF">
    <circle cx="360" cy="104" r="4"><animate attributeName="fill-opacity" values="0.3;1;0.3" dur="2.8s" begin="1.0s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="104" r="4"><animate attributeName="fill-opacity" values="0.3;1;0.3" dur="2.8s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="480" cy="104" r="4"><animate attributeName="fill-opacity" values="0.3;1;0.3" dur="2.8s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="540" cy="104" r="4"><animate attributeName="fill-opacity" values="0.3;1;0.3" dur="2.8s" begin="1.6s" repeatCount="indefinite"/></circle>
  </g>
  <g fill="#3DDC84">
    <circle cx="600" cy="104" r="4"><animate attributeName="fill-opacity" values="0.3;1;0.3" dur="2.8s" begin="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="660" cy="104" r="4"><animate attributeName="fill-opacity" values="0.3;1;0.3" dur="2.8s" begin="2.0s" repeatCount="indefinite"/></circle>
    <circle cx="720" cy="104" r="4"><animate attributeName="fill-opacity" values="0.3;1;0.3" dur="2.8s" begin="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="780" cy="104" r="4"><animate attributeName="fill-opacity" values="0.3;1;0.3" dur="2.8s" begin="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="840" cy="104" r="4"><animate attributeName="fill-opacity" values="0.3;1;0.3" dur="2.8s" begin="2.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- traveling build signal -->
  <circle r="3.5" fill="#ffffff">
    <animateMotion dur="2.8s" repeatCount="indefinite" path="M 60 104 L 840 104"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.9;1" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <text x="450" y="155" text-anchor="middle" font-family="'Segoe UI', -apple-system, Helvetica, Arial, sans-serif" font-size="14" letter-spacing="3" fill="#94a3b8">14 GRADLE CONVENTION PLUGINS &#183; KOTLIN MULTIPLATFORM &#183; COMPOSE</text>
</svg>
